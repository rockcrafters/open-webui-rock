# Open WebUI Rock
# Based on: https://github.com/open-webui/open-webui/blob/main/Dockerfile
---
name: open-webui
base: ubuntu@24.04
build-base: ubuntu@24.04
version: '0.9'
summary: Open WebUI - a self-hosted AI interface for LLMs
description: |
  Open WebUI is an extensible, feature-rich, and user-friendly self-hosted
  WebUI designed to operate entirely offline. It supports OpenAI-compatible
  APIs, Ollama, and many more backends. Built for production use, it provides
  a full-featured chat interface, RAG (Retrieval Augmented Generation), tool
  use, multi-model support, and extensive admin controls.

  This rock packages both the SvelteKit frontend and the Python/FastAPI backend
  as a single OCI image, managed by Pebble. It listens on port 8080.

  Slim build: ML models (sentence-transformers, faster-whisper) are NOT
  pre-baked. They are downloaded on first use to a writable volume mounted at
  /app/backend/data.
license: MIT

platforms:
  amd64:

services:
  open-webui:
    override: replace
    command: /bin/bash /app/backend/start.sh
    startup: enabled
    working-dir: /app/backend
    user: open-webui
    group: open-webui
    environment:
      # Server config
      PORT: "8080"
      HOST: "0.0.0.0"
      ENV: prod
      PYTHONUNBUFFERED: "1"

      # Slim build: skip automatic model downloads at startup.
      # Set USE_SLIM_DOCKER=false at runtime to enable model downloads.
      USE_SLIM_DOCKER: "true"

      # UV link mode: copy prevents 0-byte corruption in cross-builds
      UV_LINK_MODE: copy

      # Telemetry opt-outs
      SCARF_NO_ANALYTICS: "true"
      DO_NOT_TRACK: "true"
      ANONYMIZED_TELEMETRY: "false"

      # Cache and model dirs (writable volume expected at /app/backend/data)
      WHISPER_MODEL: base
      WHISPER_MODEL_DIR: /app/backend/data/cache/whisper/models
      RAG_EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      SENTENCE_TRANSFORMERS_HOME: /app/backend/data/cache/embedding/models
      TIKTOKEN_ENCODING_NAME: cl100k_base
      TIKTOKEN_CACHE_DIR: /app/backend/data/cache/tiktoken
      HF_HOME: /app/backend/data/cache/embedding/models

      # Ollama / OpenAI base URLs (override at runtime)
      OLLAMA_BASE_URL: "/ollama"
      OPENAI_API_BASE_URL: ""
      OPENAI_API_KEY: ""

      # Secret key — generated by start.sh from /dev/random on first run
      WEBUI_SECRET_KEY: ""

      # Docker flag consumed by start.sh
      DOCKER: "true"

      # Activate the virtualenv so python3, uvicorn, etc. resolve correctly.
      # start.sh uses `python3 -m uvicorn`; this ensures the venv's python3
      # is used rather than the system one (which has no uvicorn installed).
      VIRTUAL_ENV: /usr/lib/open-webui/venv
      PATH: /usr/lib/open-webui/venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

parts:
  # ── Part 1: Build the SvelteKit frontend ─────────────────────────────────
  # Uses the node/22/stable snap as the build tool. Outputs the compiled
  # SvelteKit bundle into the staging area for part 3 (app-files) to pick up.
  frontend-build:
    plugin: nil
    source: https://github.com/open-webui/open-webui
    source-type: git
    source-tag: v0.9.6
    source-depth: 1
    build-snaps:
      - node/22/stable
    build-packages:
      - git
    override-build: |
      set -ex
      cd "${CRAFT_PART_SRC}"

      # Install npm dependencies
      npm ci --force

      # Build the SvelteKit frontend bundle
      APP_BUILD_HASH="${CRAFT_PROJECT_VERSION}" npm run build

      # Copy the built frontend artefacts into the part install dir
      install -d "${CRAFT_PART_INSTALL}/app/build"
      cp -a "${CRAFT_PART_SRC}/build/." "${CRAFT_PART_INSTALL}/app/build/"

      # Copy top-level files needed at runtime
      install -m 0644 "${CRAFT_PART_SRC}/CHANGELOG.md" \
        "${CRAFT_PART_INSTALL}/app/CHANGELOG.md"
      install -m 0644 "${CRAFT_PART_SRC}/package.json" \
        "${CRAFT_PART_INSTALL}/app/package.json"

  # ── Part 2a: Stage system runtime packages ───────────────────────────────
  # Separated from the Python plugin part to avoid the Python plugin's
  # implicit `organize: {bin: usr/bin}` conflicting with the `usr/bin`
  # directory that stage-packages extract into the same install dir.
  system-packages:
    plugin: nil
    stage-packages:
      # python3-venv is required by the Python plugin in part 2b.
      # On ubuntu@24.04 this resolves to python3.12-venv.
      - python3-venv
      # System libraries required by backend Python deps at runtime
      - ffmpeg
      - libsm6
      - libxext6
      - libmariadb3
      # Utilities used by start.sh and health check
      - netcat-openbsd
      - curl
      - jq
      - bash
      # Document processing (pypandoc / pandoc)
      - pandoc
      # Compression (zstd used by some Python packages)
      - zstd

  # ── Part 2b: Build the Python virtualenv with all backend deps ───────────
  # Uses a nil plugin with manual venv creation. We avoid the Python plugin
  # because its implicit organize: {bin: usr/bin} and top-level lib/ output
  # conflict with the staged system packages from part 2a.
  #
  # Strategy:
  #   1. Create the venv at /usr/lib/open-webui/venv (a non-colliding path)
  #   2. Install CPU-only PyTorch via the venv pip
  #   3. Install the rest of requirements.txt via the venv pip
  python-venv:
    plugin: nil
    source: https://github.com/open-webui/open-webui
    source-type: git
    source-tag: v0.9.6
    source-depth: 1
    after:
      - system-packages
    build-packages:
      - build-essential
      - git
      - gcc
      - libmariadb-dev
      - libffi-dev
      - libssl-dev
      - pkg-config
      # python3.12-dev provides C headers needed by C-extension packages
      - python3.12-dev
      # python3-venv (→ python3.12-venv) must be a build-package so that
      # ensurepip is available inside the LXD build container when
      # `python3 -m venv` runs. Declaring it only in system-packages
      # stage-packages is not sufficient — that installs it into the staged
      # filesystem but not into the container's live apt environment.
      - python3-venv
    override-build: |
      set -ex

      # Create the virtualenv at a stable, non-colliding path.
      # /usr/lib/open-webui/venv will not conflict with system lib/ or bin/.
      VENV_DIR="${CRAFT_PART_INSTALL}/usr/lib/open-webui/venv"
      python3 -m venv "${VENV_DIR}"

      VENV_PIP="${VENV_DIR}/bin/pip"

      # Upgrade pip inside the venv
      "${VENV_PIP}" install --no-cache-dir --upgrade pip

      # Step 2: Install CPU-only PyTorch into the venv.
      # Pinned to <=2.9.1 to avoid SIGILL on ARM (upstream Dockerfile note).
      # The custom --index-url is required for CPU-only wheels.
      "${VENV_PIP}" install --no-cache-dir \
        'torch<=2.9.1' torchvision torchaudio \
        --index-url https://download.pytorch.org/whl/cpu

      # Step 3: Install all backend Python requirements into the same venv.
      # torch is already satisfied, so pip skips re-downloading it.
      "${VENV_PIP}" install --no-cache-dir \
        -r "${CRAFT_PART_SRC}/backend/requirements.txt"

      # The runtime data directory and chromadb sentinel don't need symlinks.
      # The venv is activated via PATH in the Pebble service env, so
      # /usr/lib/open-webui/venv/bin/python3 is found automatically.
      # Do NOT create usr/bin/python3 here — system-packages already provides it.

      # Fix venv Python symlinks: the venv was created inside the LXC build
      # container where stage packages land under /root/stage/. The symlinks
      # python3 and python3.12 will point to that build-time path, which does
      # not exist at runtime. Rewrite them to the canonical runtime path.
      ln -sf /usr/bin/python3.12 "${VENV_DIR}/bin/python3.12"
      ln -sf python3.12 "${VENV_DIR}/bin/python3"
      ln -sf python3.12 "${VENV_DIR}/bin/python"

      # Fix all venv entry-point scripts: pip writes shebangs that embed the
      # absolute build-time path of the Python interpreter. At runtime this
      # path (containing /root/parts/.../install/ or /root/stage/) does not
      # exist. Replace any absolute venv-bin path with the runtime path.
      # We use a while-read loop to avoid xargs exit-code propagation issues.
      while IFS= read -r -d '' script; do
        sed -i \
          "s|#!${VENV_DIR}/bin/python3|#!/usr/lib/open-webui/venv/bin/python3|g" \
          "${script}" 2>/dev/null || true
      done < <(find "${VENV_DIR}/bin" -type f -executable -print0)

      # Also fix pyvenv.cfg which records the absolute home path of Python
      sed -i \
        "s|home = /root/stage/usr/bin|home = /usr/bin|g" \
        "${VENV_DIR}/pyvenv.cfg" 2>/dev/null || true
      sed -i \
        "s|home = /root/parts/python-venv/install/usr/bin|home = /usr/bin|g" \
        "${VENV_DIR}/pyvenv.cfg" 2>/dev/null || true

      # Create the runtime data directory tree (mounted as a volume in prod)
      install -d -m 0750 "${CRAFT_PART_INSTALL}/app/backend/data"
      install -d -m 0750 \
        "${CRAFT_PART_INSTALL}/app/backend/data/cache/whisper/models" \
        "${CRAFT_PART_INSTALL}/app/backend/data/cache/embedding/models" \
        "${CRAFT_PART_INSTALL}/app/backend/data/cache/tiktoken"

      # Chromadb telemetry opt-out sentinel
      install -d -m 0755 "${CRAFT_PART_INSTALL}/root/.cache/chroma"
      echo -n '00000000-0000-0000-0000-000000000000' \
        > "${CRAFT_PART_INSTALL}/root/.cache/chroma/telemetry_user_id"

  # ── Part 3: Copy backend source files ────────────────────────────────────
  # Assembles the backend Python source tree at /app/backend and pulls the
  # compiled frontend from the staging area populated by part 1.
  app-files:
    plugin: nil
    source: https://github.com/open-webui/open-webui
    source-type: git
    source-tag: v0.9.6
    source-depth: 1
    after:
      - frontend-build
      - system-packages
      - python-venv
    override-build: |
      set -ex

      # Copy the backend Python package into the rock
      install -d "${CRAFT_PART_INSTALL}/app/backend"
      cp -a "${CRAFT_PART_SRC}/backend/." "${CRAFT_PART_INSTALL}/app/backend/"

      # Pull the built frontend from the staging area (populated by part 1)
      install -d "${CRAFT_PART_INSTALL}/app/build"
      cp -a "${CRAFT_STAGE}/app/build/." "${CRAFT_PART_INSTALL}/app/build/"

      # Copy top-level runtime files
      cp -a "${CRAFT_STAGE}/app/CHANGELOG.md" "${CRAFT_PART_INSTALL}/app/"
      cp -a "${CRAFT_STAGE}/app/package.json" "${CRAFT_PART_INSTALL}/app/"

  # ── Part 4: Create non-root user ─────────────────────────────────────────
  # UID/GID 584792 matches Pebble's _daemon_ user, consistent with Canonical
  # rock best practice.
  non-root-user:
    plugin: nil
    after:
      - app-files
    overlay-script: |
      groupadd -R "${CRAFT_OVERLAY}" -g 584792 open-webui
      useradd -R "${CRAFT_OVERLAY}" \
        -M -r \
        -g open-webui \
        -u 584792 \
        -s /usr/sbin/nologin \
        open-webui
    override-prime: |
      craftctl default
      # Transfer ownership of /app and the chroma cache to _daemon_
      chown -R 584792:584792 app/
      chown -R 584792:584792 root/.cache/chroma/ 2>/dev/null || true

  # ── Part 5: Security manifest ─────────────────────────────────────────────
  deb-security-manifest:
    plugin: make
    source: https://github.com/canonical/rocks-security-manifest
    source-type: git
    source-branch: main
    after:
      - non-root-user
    override-prime: gen_manifest
